<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>4myfriend</title>
<script src="https://cdn.jsdelivr.net/npm/ably@2/ably.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d1117;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh;
  font-family:'Segoe UI',sans-serif;
  color:#e0e0e0; user-select:none;
}
h1 { font-size:22px; font-weight:700; letter-spacing:3px; margin-bottom:14px; color:#fff; }

#lobby {
  display:flex; flex-direction:column; align-items:center; gap:14px;
  background:#161b27; border:1px solid #2a2f42;
  border-radius:16px; padding:32px 44px; min-width:360px;
}
#lobby h2 { font-size:15px; font-weight:500; color:#888; }
#room-row { display:flex; gap:8px; width:100%; }
#room-input {
  flex:1; padding:10px 14px;
  background:#0d1117; border:1px solid #2a2f42;
  border-radius:8px; color:#fff; font-size:14px; outline:none;
}
#room-input:focus { border-color:#7c3aed; }
.btn {
  padding:10px 20px; border-radius:8px; border:none; cursor:pointer;
  font-size:14px; font-weight:600; background:#7c3aed; color:#fff;
  transition:background .15s;
}
.btn:hover { background:#6d28d9; }
.btn:disabled { background:#2a2f42; color:#555; cursor:not-allowed; }

#share-row {
  display:none; align-items:center; gap:8px; width:100%;
  background:#0d1117; border:1px solid #2a2f42;
  border-radius:8px; padding:8px 12px;
}
#share-link {
  flex:1; font-size:12px; color:#666;
  overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
}
#copy-btn {
  flex-shrink:0; padding:5px 12px; border-radius:6px;
  border:1px solid #2a2f42; background:#1e2535;
  color:#aaa; font-size:12px; font-weight:600;
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
#copy-btn:hover { background:#2a2f42; color:#fff; }
#copy-btn.copied { border-color:#059669; color:#34d399; }

#players-waiting { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.player-badge { padding:6px 16px; border-radius:99px; font-size:13px; font-weight:600; }

#lobby-status { font-size:13px; color:#555; text-align:center; }

#ready-btn {
  display:none; width:100%; padding:12px; border-radius:8px; border:none;
  cursor:pointer; font-size:15px; font-weight:700;
  background:#059669; color:#fff; transition:background .15s;
}
#ready-btn:hover { background:#047857; }
#ready-btn.ready { background:#1e2535; color:#6b7280; }

#countdown-screen {
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:12px;
}
#countdown-num { font-size:100px; font-weight:700; color:#fff; line-height:1; }
#countdown-label { font-size:18px; color:#888; }

#game-screen { display:none; flex-direction:column; align-items:center; }
#score-bar { display:flex; gap:14px; margin-bottom:10px; }
.pill { padding:4px 16px; border-radius:99px; font-size:13px; font-weight:600; }
canvas { display:block; border-radius:12px; border:1px solid #2a2f42; cursor:crosshair; }
#hint { margin-top:8px; font-size:12px; color:#444; text-align:center; }

#win-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.78);
  display:none; align-items:center; justify-content:center;
  flex-direction:column; gap:20px; z-index:20;
}
#win-overlay.show { display:flex; }
#win-text { font-size:34px; font-weight:700; color:#fff; }
#play-again-btn {
  padding:12px 32px; background:#fff; color:#0d1117;
  border:none; border-radius:99px; font-size:16px; font-weight:600; cursor:pointer;
}
#play-again-btn:hover { background:#ddd; }
</style>
</head>
<body>
<h1>4myfriend</h1>

<div id="lobby">
  <h2 id="lobby-title">创建或加入房间</h2>
  <div id="room-row">
    <input id="room-input" placeholder="输入房间名…" maxlength="20" />
    <button class="btn" id="join-btn" onclick="joinRoom()">加入</button>
  </div>
  <div id="share-row">
    <span id="share-link"></span>
    <button id="copy-btn" onclick="copyLink()">复制链接</button>
  </div>
  <div id="players-waiting"></div>
  <div id="lobby-status">输入房间名后加入</div>
  <button id="ready-btn" onclick="toggleReady()">✅ 准备好了！</button>
</div>

<div id="countdown-screen">
  <div id="countdown-num">3</div>
  <div id="countdown-label">游戏即将开始…</div>
</div>

<div id="game-screen">
  <div id="score-bar">
    <span class="pill" id="pill0" style="background:#2d1f5e;color:#c4b5fd;border:1px solid #7c3aed44">P1: 0/3</span>
    <span class="pill" id="pill1" style="background:#0d3320;color:#34d399;border:1px solid #05966988">P2: 0/3</span>
    <span class="pill" id="pill2" style="background:#3a1a0a;color:#fb923c;border:1px solid #ea580c88">P3: 0/3</span>
  </div>
  <canvas id="gc" width="620" height="520"></canvas>
  <div id="hint">WASD 移动 · 按住鼠标左键靠近宝石拾取 · 松开放下 · 可偷别人收纳点里的宝石！</div>
</div>

<div id="win-overlay">
  <div id="win-text">🏆 获胜！</div>
  <button id="play-again-btn" onclick="location.reload()">再来一局</button>
</div>

<script>
const ABLY_KEY = '77kKvQ.lP_gZg:VdQR6rg-gWPQA1JCK6Edgjt07SQgJ8MvxT_XM5BfvZc';
const WIN=3, SPEED=2.6, PICK_R=36, BASE_R=44, W=620, H=520;
const PC=['#a78bfa','#34d399','#fb923c'];
const PBG=['rgba(124,58,237,0.18)','rgba(5,150,105,0.18)','rgba(234,88,12,0.18)'];
const PRING=['#7c3aed','#059669','#ea580c'];
const GEM_COLS=['#e879f9','#67e8f9','#fde68a','#86efac','#fca5a5','#c4b5fd','#fdba74','#a5f3fc'];
const BASES=[{x:80,y:80},{x:540,y:80},{x:310,y:460}];
const STARTS=[{x:80,y:150},{x:540,y:150},{x:310,y:390}];
const GPOS=[{x:310,y:190},{x:240,y:230},{x:380,y:230},{x:180,y:270},{x:310,y:270},{x:440,y:270},{x:240,y:320},{x:380,y:320},{x:310,y:355}];

let ably,channel,myId,myIdx=-1,roomName='';
let players=[],gems=[],readyMap={},gameStarted=false,gameOver=false;
let keys={},mouseDown=false,prevMouse=false;
let canvas,ctx,isHost=false;

// 读取URL中的房间名 —— 兼容普通页面和itch.io iframe
function getRoomFromUrl() {
  // 先试 search
  try {
    const p = new URLSearchParams(location.search);
    if (p.get('room')) return p.get('room');
  } catch(e){}
  // 再试 hash
  try {
    const h = location.hash.replace('#','');
    if (h) return decodeURIComponent(h);
  } catch(e){}
  return null;
}

window.addEventListener('load', () => {
  const r = getRoomFromUrl();
  if (r) {
    document.getElementById('room-input').value = r;
    joinRoom();
  }
  // 支持回车
  document.getElementById('room-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinRoom();
  });
});

function getShareUrl(room) {
  // itch.io里location.href是iframe内部地址，用hash兼容
  const base = location.href.split('?')[0].split('#')[0];
  return base + '#' + encodeURIComponent(room);
}

function joinRoom() {
  const input = document.getElementById('room-input').value.trim();
  if (!input) return;
  roomName = input;
  document.getElementById('join-btn').disabled = true;
  document.getElementById('room-input').disabled = true;
  document.getElementById('lobby-status').textContent = '连接中…';

  const shareUrl = getShareUrl(roomName);
  document.getElementById('share-link').textContent = shareUrl;
  document.getElementById('share-row').style.display = 'flex';

  ably = new Ably.Realtime({ key: ABLY_KEY, clientId: 'u_'+Math.random().toString(36).slice(2,10) });

  // 8秒超时提示
  const connTimeout = setTimeout(() => {
    if (ably.connection.state !== 'connected') {
      document.getElementById('lobby-status').textContent =
        '⚠️ 连接超时，请尝试直接用浏览器打开游戏链接，而不是在 itch.io 内嵌框里玩';
    }
  }, 8000);

  ably.connection.on('connecting', () => {
    document.getElementById('lobby-status').textContent = '连接中（connecting）…';
  });
  ably.connection.on('connected', () => {
    clearTimeout(connTimeout);
    myId = ably.options.clientId;
    channel = ably.channels.get('gems-v2-' + roomName);
    channel.presence.subscribe(onPresenceChange);
    channel.subscribe(handleMsg);
    channel.presence.enter({}, err => {
      if (!err) {
        document.getElementById('ready-btn').style.display = 'block';
        document.getElementById('lobby-title').textContent = '房间：' + roomName;
        document.getElementById('lobby-status').textContent = '等待玩家加入…';
      }
    });
  });
  ably.connection.on('failed', () => {
    clearTimeout(connTimeout);
    document.getElementById('lobby-status').textContent = '连接失败，请刷新重试';
    document.getElementById('join-btn').disabled = false;
    document.getElementById('room-input').disabled = false;
  });
  ably.connection.on('disconnected', () => {
    document.getElementById('lobby-status').textContent = '连接断开，重连中…';
  });
}

function onPresenceChange() {
  channel.presence.get((err, members) => {
    if (err) return;
    // host = 第一个进入的人（clientId字母序最小）
    const sorted = members.slice().sort((a,b)=>a.clientId<b.clientId?-1:1);
    isHost = sorted.length > 0 && sorted[0].clientId === ably.options.clientId;
    renderWaiting(members.map(m=>m.clientId));
  });
}

function renderWaiting(ids) {
  const el = document.getElementById('players-waiting');
  el.innerHTML = '';
  ids.forEach((id,i) => {
    const badge = document.createElement('span');
    badge.className = 'player-badge';
    badge.style.background = ['#2d1f5e','#0d3320','#3a1a0a'][i]||'#222';
    badge.style.color = ['#c4b5fd','#34d399','#fb923c'][i]||'#aaa';
    const rdy = readyMap[id];
    badge.textContent = 'P'+(i+1) + (id===ably.options.clientId?' (你)':'') + (rdy?' ✅':' …');
    el.appendChild(badge);
  });
  const rdyCount = Object.values(readyMap).filter(Boolean).length;
  document.getElementById('lobby-status').textContent =
    ids.length+'/3 人在线 · '+rdyCount+'/'+ids.length+' 人已准备';
}

function toggleReady() {
  const btn = document.getElementById('ready-btn');
  const nowReady = !readyMap[ably.options.clientId];
  readyMap[ably.options.clientId] = nowReady;
  btn.textContent = nowReady ? '⏳ 等待其他玩家…' : '✅ 准备好了！';
  nowReady ? btn.classList.add('ready') : btn.classList.remove('ready');
  // 广播给所有人（包括自己通过消息处理）
  channel.publish('ready', { id: ably.options.clientId, ready: nowReady });
  checkAllReady();
}

function checkAllReady() {
  channel.presence.get((err, members) => {
    if (err || members.length < 2) return;
    const allReady = members.every(m => readyMap[m.clientId]);
    if (allReady && isHost && !gameStarted) {
      gameStarted = true;
      channel.publish('start-countdown', { time: Date.now() });
    }
  });
}

function handleMsg(msg) {
  if (msg.name === 'ready') {
    readyMap[msg.data.id] = msg.data.ready;
    channel.presence.get((err,members)=>{ if(!err) renderWaiting(members.map(m=>m.clientId)); });
    checkAllReady();
  }
  if (msg.name === 'start-countdown' && !gameStarted) {
    gameStarted = true;
    startCountdown();
  }
  if (msg.name === 'init-game') {
    applyInit(msg.data);
  }
  if (msg.name === 'sync') {
    if (!players.length) return;
    const p = players.find(x=>x.id===msg.data.id);
    if (p) { p.x=msg.data.x; p.y=msg.data.y; }
  }
  if (msg.name === 'pickup') {
    const gi=msg.data.gemIdx, pid=msg.data.id;
    const pIdx=players.findIndex(x=>x.id===pid);
    if (pIdx<0) return;
    const g=gems[gi]; if(!g||g.held) return;
    if (g.deposited) { players[g.ownerIdx].score=Math.max(0,players[g.ownerIdx].score-1); g.deposited=false; g.ownerIdx=-1; }
    g.held=true; g.holderIdx=pIdx; players[pIdx].heldGemIdx=gi;
    updateScoreUI();
  }
  if (msg.name === 'drop') {
    const pid=msg.data.id, pIdx=players.findIndex(x=>x.id===pid);
    if (pIdx<0) return;
    const p=players[pIdx], gi=p.heldGemIdx; if(gi<0) return;
    const g=gems[gi];
    g.held=false; g.holderIdx=-1; p.heldGemIdx=-1;
    if (msg.data.atBase) {
      g.x=msg.data.gx; g.y=msg.data.gy; g.deposited=true; g.ownerIdx=pIdx;
      p.score++; updateScoreUI();
      if (p.score>=WIN) showWin(p.name);
    } else { g.x=p.x; g.y=p.y; }
  }
}

function startCountdown() {
  document.getElementById('lobby').style.display='none';
  document.getElementById('countdown-screen').style.display='flex';
  let n=3;
  document.getElementById('countdown-num').textContent=n;
  const iv=setInterval(()=>{
    n--;
    if (n<=0) {
      clearInterval(iv);
      document.getElementById('countdown-screen').style.display='none';
      if (isHost) sendInit();
    } else {
      document.getElementById('countdown-num').textContent=n;
    }
  },1000);
}

function sendInit() {
  channel.presence.get((err,members)=>{
    if (err) return;
    const sorted = members.slice().sort((a,b)=>a.clientId<b.clientId?-1:1);
    const ids = sorted.map(m=>m.clientId);
    const initPlayers = ids.map((id,i)=>({
      id, name:'P'+(i+1), x:STARTS[i].x, y:STARTS[i].y,
      score:0, heldGemIdx:-1, colorIdx:i,
    }));
    const initGems = GPOS.map((p,i)=>({
      x:p.x,y:p.y,held:false,holderIdx:-1,deposited:false,ownerIdx:-1,
      color:GEM_COLS[i%GEM_COLS.length],
    }));
    channel.publish('init-game', { players:initPlayers, gems:initGems });
  });
}

function applyInit(data) {
  players=data.players; gems=data.gems;
  myIdx=players.findIndex(p=>p.id===ably.options.clientId);
  document.getElementById('game-screen').style.display='flex';
  canvas=document.getElementById('gc'); ctx=canvas.getContext('2d');
  updateScoreUI();
  canvas.addEventListener('mousedown',e=>{ if(e.button===0) mouseDown=true; });
  canvas.addEventListener('mouseup',  e=>{ if(e.button===0) mouseDown=false; });
  canvas.addEventListener('mouseleave',()=>{ mouseDown=false; });
  requestAnimationFrame(gameLoop);
}

function updateScoreUI() {
  players.forEach((p,i)=>{
    const el=document.getElementById('pill'+i);
    if(el){ el.textContent=p.name+(i===myIdx?' (你)':'')+': '+p.score+'/'+WIN; }
  });
  for(let i=players.length;i<3;i++){ const el=document.getElementById('pill'+i); if(el) el.style.display='none'; }
}

function nearestPickupable() {
  if (myIdx<0) return null;
  const me=players[myIdx];
  let best=null,bestD=9999;
  gems.forEach((g,i)=>{
    if(g.held) return;
    if(g.deposited){
      if(g.ownerIdx===myIdx) return;
      const base=BASES[g.ownerIdx];
      const d=Math.hypot(me.x-base.x,me.y-base.y);
      if(d<BASE_R+8&&d<bestD){best=i;bestD=d;}
    } else {
      const d=Math.hypot(me.x-g.x,me.y-g.y);
      if(d<PICK_R&&d<bestD){best=i;bestD=d;}
    }
  });
  return best;
}

let lastSX=-1,lastSY=-1;

function gameLoop() {
  if (!gameOver && myIdx>=0 && players[myIdx]) {
    const me=players[myIdx];
    let dx=0,dy=0;
    if(keys['w']||keys['arrowup'])    dy-=SPEED;
    if(keys['s']||keys['arrowdown'])  dy+=SPEED;
    if(keys['a']||keys['arrowleft'])  dx-=SPEED;
    if(keys['d']||keys['arrowright']) dx+=SPEED;
    if(dx&&dy){dx*=0.707;dy*=0.707;}
    me.x=Math.max(14,Math.min(W-14,me.x+dx));
    me.y=Math.max(14,Math.min(H-14,me.y+dy));

    if(Math.abs(me.x-lastSX)>1||Math.abs(me.y-lastSY)>1){
      channel.publish('sync',{id:ably.options.clientId,x:me.x,y:me.y});
      lastSX=me.x;lastSY=me.y;
    }
    if(me.heldGemIdx>=0){ gems[me.heldGemIdx].x=me.x; gems[me.heldGemIdx].y=me.y-22; }

    if(mouseDown&&!prevMouse){
      const gi=nearestPickupable();
      if(gi!==null&&me.heldGemIdx<0){
        const g=gems[gi];
        if(g.deposited){ players[g.ownerIdx].score=Math.max(0,players[g.ownerIdx].score-1); g.deposited=false; g.ownerIdx=-1; }
        g.held=true; g.holderIdx=myIdx; me.heldGemIdx=gi;
        channel.publish('pickup',{id:ably.options.clientId,gemIdx:gi});
        updateScoreUI();
      }
    }
    if(!mouseDown&&prevMouse&&me.heldGemIdx>=0){
      const gi=me.heldGemIdx,g=gems[gi];
      const base=BASES[myIdx],d=Math.hypot(me.x-base.x,me.y-base.y);
      const atBase=d<BASE_R;
      let gx=me.x,gy=me.y;
      if(atBase){
        const placed=gems.filter(x=>x.deposited&&x.ownerIdx===myIdx).length;
        gx=base.x+(placed%3-1)*18; gy=base.y+(Math.floor(placed/3)-0.5)*18;
        g.x=gx;g.y=gy;g.deposited=true;g.ownerIdx=myIdx;
        me.score++;updateScoreUI();
        if(me.score>=WIN) showWin(me.name);
      } else { g.x=me.x;g.y=me.y; }
      g.held=false;g.holderIdx=-1;me.heldGemIdx=-1;
      channel.publish('drop',{id:ably.options.clientId,atBase,gx,gy});
    }
    prevMouse=mouseDown;
  }
  draw();
  requestAnimationFrame(gameLoop);
}

function drawGem(x,y,col,size){
  ctx.save();ctx.translate(x,y);
  ctx.beginPath();
  ctx.moveTo(0,-size*1.1);ctx.lineTo(size*.75,-size*.15);
  ctx.lineTo(size*.55,size*.9);ctx.lineTo(-size*.55,size*.9);
  ctx.lineTo(-size*.75,-size*.15);ctx.closePath();
  ctx.fillStyle=col;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.moveTo(-size*.2,-size*.8);ctx.lineTo(size*.15,-size*.4);
  ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}

function draw(){
  if(!ctx) return;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#111827';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#1e2535';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  players.forEach((_,i)=>{
    const b=BASES[i];
    ctx.save();
    ctx.beginPath();ctx.arc(b.x,b.y,BASE_R,0,Math.PI*2);
    ctx.fillStyle=PBG[i];ctx.fill();
    ctx.strokeStyle=PRING[i];ctx.lineWidth=2;ctx.setLineDash([6,5]);ctx.stroke();ctx.setLineDash([]);
    ctx.font='bold 11px Segoe UI';ctx.textAlign='center';ctx.fillStyle=PC[i];
    const pname=players[i]?players[i].name:'P'+(i+1);
    ctx.fillText(pname+' 收纳点',b.x,b.y+BASE_R+14);
    ctx.restore();
  });

  gems.forEach(g=>{ if(!g.held) drawGem(g.x,g.y,g.color,9); });

  if(myIdx>=0&&players[myIdx]){
    const me=players[myIdx];
    ctx.save();ctx.beginPath();ctx.arc(me.x,me.y,PICK_R,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=1;ctx.stroke();ctx.restore();
  }

  players.forEach((p,i)=>{
    ctx.save();
    ctx.beginPath();ctx.ellipse(p.x,p.y+15,11,4,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,15,0,Math.PI*2);
    ctx.fillStyle=PC[i];ctx.fill();
    ctx.strokeStyle=i===myIdx?'#fff':'rgba(255,255,255,0.5)';
    ctx.lineWidth=i===myIdx?2.5:1.5;ctx.stroke();
    ctx.font='bold 9px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#0d1117';ctx.fillText(p.name,p.x,p.y);
    if(p.heldGemIdx>=0) drawGem(p.x,p.y-22,gems[p.heldGemIdx].color,7);
    ctx.restore();
  });
}

function showWin(name){
  gameOver=true;
  document.getElementById('win-text').textContent='🏆 '+name+' 获胜！';
  document.getElementById('win-overlay').classList.add('show');
}

function copyLink(){
  const url=document.getElementById('share-link').textContent;
  const btn=document.getElementById('copy-btn');
  try{
    const ta=document.createElement('textarea');
    ta.value=url;ta.style.cssText='position:fixed;top:0;left:0;opacity:0;';
    document.body.appendChild(ta);ta.focus();ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    btn.textContent='✅ 已复制';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='复制链接';btn.classList.remove('copied');},2000);
  }catch(e){ prompt('请手动复制链接：',url); }
}

document.addEventListener('keydown',e=>{
  if (!e.key) return;

  const key = e.key.toLowerCase();
  keys[key] = true;

  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(key)) {
    e.preventDefault();
  }
});

document.addEventListener('keyup',e=>{
  if (!e.key) return;
  keys[e.key.toLowerCase()] = false;
});
</script>
