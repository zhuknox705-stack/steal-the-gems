<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>4myfriend</title>
    <script src="https://imgcache.qq.com/qcloud/cloudbase-js-sdk/2.9.0/cloudbase.full.js"></script>
    <style>
        /* 这里保留你原本的 CSS 样式... */
        body { background:#0d1117; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; color:#e0e0e0; }
        #lobby { background:#161b27; border:1px solid #2a2f42; border-radius:16px; padding:32px; }
        /* 其余样式同上 */
    </style>
</head>
<body>
    <h1>4myfriend</h1>
    <div id="lobby">
        <div id="lobby-status">正在載入核心引擎...</div>
        </div>

 <script>
    const ENV_ID = 'gameroom-d3g19ov6pa4df5db7'; 

    // 1. 定义一个轮询函数，确保 SDK 真的加载进来了再运行
    function checkSDK() {
        if (typeof cloudbase !== 'undefined') {
            console.log("SDK 已就绪，开始初始化...");
            initCloudBase();
        } else {
            console.log("等待 SDK 加载...");
            setTimeout(checkSDK, 200); // 每 200ms 检查一次
        }
    }

    function initCloudBase() {
        try {
            const app = cloudbase.init({
                env: ENV_ID
            });
            window.db = app.database();
            document.getElementById('lobby-status').textContent = '连线成功！';
            console.log("⚡ 雲端握手成功");
        } catch(e) {
            console.error("初始化错误:", e);
            document.getElementById('lobby-status').textContent = '初始化失败：' + e.message;
        }
    }

    // 页面加载后立即启动探测
    window.addEventListener('DOMContentLoaded', checkSDK);
</script>
</body>
</html>
