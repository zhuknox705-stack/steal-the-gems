h1 { font-size:22px; font-weight:700; letter-spacing:3px; margin-bottom:14px; color:#fff; }

#lobby {

#room-row { display:flex; gap:8px; width:100%; }
#room-input {

}
#room-input:focus { border-color:#7c3aed; }
.btn {

  transition:background .15s;
}
.btn:hover { background:#6d28d9; }
.btn:disabled { background:#2a2f42; color:#555; cursor:not-allowed; }

#share-row {
  display:none; align-items:center; gap:8px; width:100%;
  background:#0d1117; border:1px solid #2a2f42;
  border-radius:8px; padding:8px 12px;
}
#share-link {
  flex:1; font-size:12px; color:#666;

}
#copy-btn {
  flex-shrink:0; padding:5px 12px; border-radius:6px;
  border:1px solid #2a2f42; background:#1e2535;
  color:#aaa; font-size:12px; font-weight:600;

}
#copy-btn:hover { background:#2a2f42; color:#fff; }

#players-waiting { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.player-badge { padding:6px 16px; border-radius:99px; font-size:13px; font-weight:600; }

#lobby-status { font-size:13px; color:#555; text-align:center; }

#ready-btn {
  display:none; width:100%; padding:12px; border-radius:8px; border:none;
  cursor:pointer; font-size:15px; font-weight:700;
  background:#059669; color:#fff; transition:background .15s;
}
#ready-btn:hover { background:#047857; }
#ready-btn.ready { background:#1e2535; color:#6b7280; }

#countdown-screen {
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:12px;
}
#countdown-num { font-size:100px; font-weight:700; color:#fff; line-height:1; }
#countdown-label { font-size:18px; color:#888; }

#game-screen { display:none; flex-direction:column; align-items:center; }
#score-bar { display:flex; gap:14px; margin-bottom:10px; }
.pill { padding:4px 16px; border-radius:99px; font-size:13px; font-weight:600; }
canvas { display:block; border-radius:12px; border:1px solid #2a2f42; cursor:crosshair; }
#hint { margin-top:8px; font-size:12px; color:#444; text-align:center; }

#win-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.78);
  display:none; align-items:center; justify-content:center;
  flex-direction:column; gap:20px; z-index:20;
}
#win-overlay.show { display:flex; }
#win-text { font-size:34px; font-weight:700; color:#fff; }
#play-again-btn {
  padding:12px 32px; background:#fff; color:#0d1117;
  border:none; border-radius:99px; font-size:16px; font-weight:600; cursor:pointer;
}
#play-again-btn:hover { background:#ddd; }
</style>
