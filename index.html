<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>4myfriend - 終極免卡死版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d1117;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh;
  font-family:'Segoe UI',sans-serif;
  color:#e0e0e0; user-select:none;
}
h1 { font-size:22px; font-weight:700; letter-spacing:3px; margin-bottom:14px; color:#fff; }

#lobby {
  display:flex; flex-direction:column; align-items:center; gap:14px;
  background:#161b27; border:1px solid #2a2f42;
  border-radius:16px; padding:32px 44px; min-width:360px;
}
#lobby h2 { font-size:15px; font-weight:500; color:#888; }
#room-row { display:flex; gap:8px; width:100%; }
#room-input {
  flex:1; padding:10px 14px;
  background:#0d1117; border:1px solid #2a2f42;
  border-radius:8px; color:#fff; font-size:14px; outline:none;
}
#room-input:focus { border-color:#7c3aed; }
.btn {
  padding:10px 20px; border-radius:8px; border:none; cursor:pointer;
  font-size:14px; font-weight:600; background:#7c3aed; color:#fff;
  transition:background .15s;
}
.btn:hover { background:#6d28d9; }
.btn:disabled { background:#2a2f42; color:#555; cursor:not-allowed; }

#share-row {
  display:none; align-items:center; gap:8px; width:100%;
  background:#0d1117; border:1px solid #2a2f42;
  border-radius:8px; padding:8px 12px;
}
#share-link {
  flex:1; font-size:12px; color:#666;
  overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
}
#copy-btn {
  flex-shrink:0; padding:5px 12px; border-radius:6px;
  border:1px solid #2a2f42; background:#1e2535;
  color:#aaa; font-size:12px; font-weight:600;
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
#copy-btn:hover { background:#2a2f42; color:#fff; }
#copy-btn.copied { border-color:#059669; color:#34d399; }

#players-waiting { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.player-badge { padding:6px 16px; border-radius:99px; font-size:13px; font-weight:600; }

#lobby-status { font-size:13px; color:#555; text-align:center; }

#ready-btn {
  display:none; width:100%; padding:12px; border-radius:8px; border:none;
  cursor:pointer; font-size:15px; font-weight:700;
  background:#059669; color:#fff; transition:background .15s;
}
#ready-btn:hover { background:#047857; }
#ready-btn.ready { background:#1e2535; color:#6b7280; }

#countdown-screen {
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:12px;
}
#countdown-num { font-size:100px; font-weight:700; color:#fff; line-height:1; }
#countdown-label { font-size:18px; color:#888; }

#game-screen { display:none; flex-direction:column; align-items:center; }
#score-bar { display:flex; gap:14px; margin-bottom:10px; }
.pill { padding:4px 16px; border-radius:99px; font-size:13px; font-weight:600; }
canvas { display:block; border-radius:12px; border:1px solid #2a2f42; cursor:crosshair; }
#hint { margin-top:8px; font-size:12px; color:#444; text-align:center; }

#win-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.78);
  display:none; align-items:center; justify-content:center;
  flex-direction:column; gap:20px; z-index:20;
}
#win-overlay.show { display:flex; }
#win-text { font-size:34px; font-weight:700; color:#fff; }
#play-again-btn {
  padding:12px 32px; background:#fff; color:#0d1117;
  border:none; border-radius:99px; font-size:16px; font-weight:600; cursor:pointer;
}
#play-again-btn:hover { background:#ddd; }
</style>
</head>
<body>
<h1>4myfriend</h1>

<div id="lobby">
  <h2 id="lobby-title">創建或加入房間</h2>
  <div id="room-row">
    <input id="room-input" placeholder="輸入房間名…" maxlength="20" />
    <button class="btn" id="join-btn" onclick="joinRoom()">加入</button>
  </div>
  <div id="share-row">
    <span id="share-link"></span>
    <button id="copy-btn" onclick="copyLink()">複製連結</button>
  </div>
  <div id="players-waiting"></div>
  <div id="lobby-status">正在載入核心引擎...</div>
  <button id="ready-btn" onclick="toggleReady()">✅ 準備好了！</button>
</div>

<div id="countdown-screen">
  <div id="countdown-num">3</div>
  <div id="countdown-label">遊戲即將開始…</div>
</div>

<div id="game-screen">
  <div id="score-bar">
    <span class="pill" id="pill0" style="background:#2d1f5e;color:#c4b5fd;border:1px solid #7c3aed44">P1: 0/3</span>
    <span class="pill" id="pill1" style="background:#0d3320;color:#34d399;border:1px solid #05966988">P2: 0/3</span>
    <span class="pill" id="pill2" style="background:#3a1a0a;color:#fb923c;border:1px solid #ea580c88">P3: 0/3</span>
  </div>
  <canvas id="gc" width="620" height="520"></canvas>
  <div id="hint">WASD 移動 · 按住滑鼠左鍵靠近寶石拾取 · 鬆開放下 · 可偷別人收納點裡的寶石！</div>
</div>

<div id="win-overlay">
  <div id="win-text">🏆 獲勝！</div>
  <button id="play-again-btn" onclick="location.reload()">再來一局</button>
</div>

<script>
const ENV_ID = 'gameroom-d3g19ov6pa4df5db7'; 

const WIN=3, SPEED=2.6, PICK_R=36, BASE_R=44, W=620, H=520;
const PC=['#a78bfa','#34d399','#fb923c'];
const PBG=['rgba(124,58,237,0.18)','rgba(5,150,105,0.18)','rgba(234,88,12,0.18)'];
const PRING=['#7c3aed','#059669','#ea580c'];
const GEM_COLS=['#e879f9','#67e8f9','#fde68a','#86efac','#fca5a5','#c4b5fd','#fdba74','#a5f3fc'];
const BASES=[{x:80,y:80},{x:540,y:80},{x:310,y:460}];
const STARTS=[{x:80,y:150},{x:540,y:150},{x:310,y:390}];
const GPOS=[{x:310,y:190},{x:240,y:230},{x:380,y:230},{x:180,y:270},{x:310,y:270},{x:440,y:270},{x:240,y:320},{x:380,y:320},{x:310,y:355}];

let app, db, roomDocId = null, roomWatcher = null;
let myId, myIdx=-1, roomName='';
let players=[], gems=[], readyMap={}, gameStarted=false, gameOver=false;
let keys={}, mouseDown=false, prevMouse=false;
let canvas, ctx, isHost=false;
let lastSX=-1, lastSY=-1;

// 頁面加載時立刻強制渲染基本UI，不給任何白屏的機會
window.addEventListener('DOMContentLoaded', () => {
  canvas = document.getElementById('gc');
  if(canvas) ctx = canvas.getContext('2d');
  document.getElementById('lobby-status').textContent = '輸入房間名後加入';
  
  // 異步安全載入 SDK，不阻塞頁面
  const sdk = document.createElement('script');
  sdk.src = "https://cdn.bootcdn.net/ajax/libs/cloudbase-js-sdk/1.6.0/cloudbase.full.js";
  sdk.onload = initCloudBase;
  sdk.onerror = () => {
    console.error("SDK加載被阻斷，啟用沙盒模式");
    document.getElementById('lobby-status').textContent = '⚠️ 網絡阻斷，已切換至單機測試模式';
  };
  document.head.appendChild(sdk);

  const r = getRoomFromUrl();
  if (r) { document.getElementById('room-input').value = r; setTimeout(joinRoom, 500); }
  document.getElementById('room-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });
});

function initCloudBase() {
  try {
    if (typeof cloudbase !== 'undefined') {
      app = cloudbase.init({ env: ENV_ID, appSign: '4myfriend', appConnectMethod: 'post' });
      db = app.database();
      console.log("⚡ 雲端動態連線成功");
    }
  } catch(e) { console.error("雲端初始化失敗", e); }
}

function getRoomFromUrl() {
  try {
    const p = new URLSearchParams(location.search); if (p.get('room')) return p.get('room');
  } catch(e){}
  try {
    const h = location.hash.replace('#',''); if (h) return decodeURIComponent(h);
  } catch(e){}
  return null;
}

function getShareUrl(room) {
  return location.href.split('?')[0].split('#')[0] + '#' + encodeURIComponent(room);
}

async function joinRoom() {
  const input = document.getElementById('room-input').value.trim();
  if (!input) return;
  roomName = input;
  document.getElementById('join-btn').disabled = true;
  document.getElementById('room-input').disabled = true;
  document.getElementById('lobby-status').textContent = '正在連線雲端資料庫…';

  document.getElementById('share-link').textContent = getShareUrl(roomName);
  document.getElementById('share-row').style.display = 'flex';
  myId = 'u_' + Math.random().toString(36).slice(2,10);

  // 如果雲端組件載入失敗，就地單機啟動，絕不卡死
  if (!db) {
    document.getElementById('lobby-status').textContent = '進入單機沙盒測試模式';
    setTimeout(() => {
      gameStarted = true;
      applyInit({
        players: [{ id: myId, name: 'P1 (本地)', x: STARTS[0].x, y: STARTS[0].y, score: 0, heldGemIdx: -1, colorIdx: 0 }],
        gems: GPOS.map((p, i) => ({ x: p.x, y: p.y, held: false, holderIdx: -1, deposited: false, ownerIdx: -1, color: GEM_COLS[i % GEM_COLS.length] }))
      });
    }, 1000);
    return;
  }

  try {
    const auth = app.auth({ persistence: "local" });
    try { if (!auth.hasLoginState()) { await auth.anonymousAuthProvider().signIn(); } } catch(e){}

    const res = await db.collection('game_rooms').where({ roomName: roomName }).get();
    if (res.data.length === 0) {
      isHost = true;
      const createRes = await db.collection('game_rooms').add({
        roomName: roomName, members: [myId], readyMap: { [myId]: false }, gameStarted: false,
        lastSync: { id: '', x: 0, y: 0 }, actionLog: { type: 'none', ts: Date.now() }, initData: {}
      });
      roomDocId = createRes.id;
    } else {
      isHost = false;
      const roomData = res.data[0]; roomDocId = roomData._id;
      if (roomData.members.length >= 3 || roomData.gameStarted) { alert("房間已滿或遊戲已開始！"); location.reload(); return; }
      await db.collection('game_rooms').doc(roomDocId).update({ members: db.command.push(myId), [`readyMap.${myId}`]: false });
    }
    startTunnel();
  } catch(err) {
    console.error(err);
    document.getElementById('lobby-status').textContent = '⚠️ 連線失敗，請確認後台已建 game_rooms 集合';
    document.getElementById('join-btn').disabled = false;
    document.getElementById('room-input').disabled = false;
  }
}

function startTunnel() {
  document.getElementById('ready-btn').style.display = 'block';
  document.getElementById('lobby-title').textContent = '房間：' + roomName;
  
  roomWatcher = db.collection('game_rooms').doc(roomDocId).watch({
    onChange: snapshot => {
      if (snapshot.docs.length === 0) return;
      const roomData = snapshot.docs[0];
      readyMap = roomData.readyMap || {};
      isHost = roomData.members.slice().sort()[0] === myId;
      
      if (!gameStarted) {
        renderWaiting(roomData.members);
        if (roomData.gameStarted) { gameStarted = true; cachedInitData = roomData.initData; startCountdown(); }
      } else {
        const sync = roomData.lastSync;
        if (sync && sync.id !== myId && players.length) {
          const p = players.find(x => x.id === sync.id); if (p) { p.x = sync.x; p.y = sync.y; }
        }
        const action = roomData.actionLog;
        if (action && action.ts > lastActionTs) { lastActionTs = action.ts; handleAction(action); }
      }
    },
    onError: err => { console.error(err); }
  });
}

let cachedInitData = null, lastActionTs = 0;

function renderWaiting(ids) {
  const el = document.getElementById('players-waiting'); if(!el) return;
  el.innerHTML = '';
  ids.forEach((id, i) => {
    const badge = document.createElement('span');
    badge.className = 'player-badge';
    badge.style.background = ['#2d1f5e','#0d3320','#3a1a0a'][i]||'#222';
    badge.style.color = ['#c4b5fd','#34d399','#fb923c'][i]||'#aaa';
    badge.textContent = 'P'+(i+1) + (id===myId?' (你)':'') + (readyMap[id]?' ✅':' …');
    el.appendChild(badge);
  });
  document.getElementById('lobby-status').textContent = ids.length+'/3 人在線 · 已準備';
}

async function toggleReady() {
  const btn = document.getElementById('ready-btn');
  const nowReady = !readyMap[myId]; readyMap[myId] = nowReady;
  btn.textContent = nowReady ? '⏳ 等待其他玩家…' : '✅ 準備好了！';
  nowReady ? btn.classList.add('ready') : btn.classList.remove('ready');
  if(db) await db.collection('game_rooms').doc(roomDocId).update({ [`readyMap.${myId}`]: nowReady });
  checkAllReady();
}

async function checkAllReady() {
  if (!isHost || gameStarted || !db) return;
  const res = await db.collection('game_rooms').doc(roomDocId).get();
  if (res.data.length === 0) return;
  const roomData = res.data[0]; const members = roomData.members;
  if (members.length < 2) return;
  if (members.every(m => roomData.readyMap[m])) {
    const sorted = members.slice().sort();
    const initPlayers = sorted.map((id, i) => ({ id, name: 'P' + (i + 1), x: STARTS[i].x, y: STARTS[i].y, score: 0, heldGemIdx: -1, colorIdx: i }));
    const initGems = GPOS.map((p, i) => ({ x: p.x, y: p.y, held: false, holderIdx: -1, deposited: false, ownerIdx: -1, color: GEM_COLS[i % GEM_COLS.length] }));
    await db.collection('game_rooms').doc(roomDocId).update({ gameStarted: true, initData: { players: initPlayers, gems: initGems }, actionLog: { type: 'start', ts: Date.now() } });
  }
}

function startCountdown() {
  document.getElementById('lobby').style.display='none';
  document.getElementById('countdown-screen').style.display='flex';
  let n=3; document.getElementById('countdown-num').textContent=n;
  const iv = setInterval(() => {
    n--; if (n <= 0) { clearInterval(iv); document.getElementById('countdown-screen').style.display='none'; applyInit(cachedInitData); }
    else { document.getElementById('countdown-num').textContent=n; }
  }, 1000);
}

function applyInit(data) {
  players = data.players; gems = data.gems; myIdx = players.findIndex(p => p.id === myId);
  document.getElementById('game-screen').style.display='flex'; updateScoreUI();
  canvas.addEventListener('mousedown', e => { if(e.button===0) mouseDown=true; });
  canvas.addEventListener('mouseup',   e => { if(e.button===0) mouseDown=false; });
  canvas.addEventListener('mouseleave', () => { mouseDown=false; });
  requestAnimationFrame(gameLoop);
}

function handleAction(action) {
  if (action.type === 'pickup') {
    const pIdx = players.findIndex(x => x.id === action.pid); if (pIdx < 0 || pIdx === myIdx) return; 
    const g = gems[action.gemIdx]; if (!g || g.held) return;
    if (g.deposited) { players[g.ownerIdx].score = Math.max(0, players[g.ownerIdx].score - 1); g.deposited = false; g.ownerIdx = -1; }
    g.held = true; g.holderIdx = pIdx; players[pIdx].heldGemIdx = action.gemIdx; updateScoreUI();
  }
  if (action.type === 'drop') {
    const pIdx = players.findIndex(x => x.id === action.pid); if (pIdx < 0 || pIdx === myIdx) return;
    const p = players[pIdx], gi = p.heldGemIdx; if (gi < 0) return; const g = gems[gi];
    g.held = false; g.holderIdx = -1; p.heldGemIdx = -1;
    if (action.atBase) { g.x = action.gx; g.y = action.gy; g.deposited = true; g.ownerIdx = pIdx; p.score++; updateScoreUI(); if (p.score >= WIN) showWin(p.name); }
    else { g.x = action.gx; g.y = action.gy; }
  }
}

function updateScoreUI() {
  players.forEach((p,i)=>{ const el=document.getElementById('pill'+i); if(el){ el.textContent=p.name+(i===myIdx?' (你)':'')+': '+p.score+'/'+WIN; } });
}

function nearestPickupable() {
  if (myIdx<0) return null; const me=players[myIdx]; let best=null,bestD=9999;
  gems.forEach((g,i)=>{
    if(g.held) return;
    if(g.deposited){ if(g.ownerIdx===myIdx) return; const base=BASES[g.ownerIdx]; const d=Math.hypot(me.x-base.x,me.y-base.y); if(d<BASE_R+8&&d<bestD){best=i;bestD=d;} }
    else { const d=Math.hypot(me.x-g.x,me.y-g.y); if(d<PICK_R&&d<bestD){best=i;bestD=d;} }
  });
  return best;
}

function gameLoop() {
  if (!gameOver && myIdx>=0 && players[myIdx]) {
    const me=players[myIdx]; let dx=0,dy=0;
    if(keys['w']||keys['arrowup']) dy-=SPEED; if(keys['s']||keys['arrowdown']) dy+=SPEED;
    if(keys['a']||keys['arrowleft']) dx-=SPEED; if(keys['d']||keys['arrowright']) dx+=SPEED;
    if(dx&&dy){dx*=0.707;dy*=0.707;} me.x=Math.max(14,Math.min(W-14,me.x+dx)); me.y=Math.max(14,Math.min(H-14,me.y+dy));

    if((Math.abs(me.x-lastSX)>1||Math.abs(me.y-lastSY)>1) && db){
      db.collection('game_rooms').doc(roomDocId).update({ lastSync: { id: myId, x: me.x, y: me.y } }).catch(e=>{});
      lastSX=me.x; lastSY=me.y;
    }
    if(me.heldGemIdx>=0){ gems[me.heldGemIdx].x=me.x; gems[me.heldGemIdx].y=me.y-22; }

    if(mouseDown&&!prevMouse){
      const gi=nearestPickupable();
      if(gi!==null&&me.heldGemIdx<0){
        const g=gems[gi]; if(g.deposited){ players[g.ownerIdx].score=Math.max(0,players[g.ownerIdx].score-1); g.deposited=false; g.ownerIdx=-1; }
        g.held=true; g.holderIdx=myIdx; me.heldGemIdx=gi;
        if(db){ db.collection('game_rooms').doc(roomDocId).update({ actionLog: { type: 'pickup', pid: myId, gemIdx: gi, ts: Date.now() } }).catch(e=>{}); }
        updateScoreUI();
      }
    }
    if(!mouseDown&&prevMouse&&me.heldGemIdx>=0){
      const gi=me.heldGemIdx,g=gems[gi]; const base=BASES[myIdx],d=Math.hypot(me.x-base.x,me.y-base.y); const atBase=d<BASE_R; let gx=me.x,gy=me.y;
      if(atBase){
        const placed=gems.filter(x=>x.deposited&&x.ownerIdx===myIdx).length;
        gx=base.x+(placed%3-1)*18; gy=base.y+(Math.floor(placed/3)-0.5)*18; g.x=gx; g.y=gy; g.deposited=true; g.ownerIdx=myIdx; me.score++; updateScoreUI(); if(me.score>=WIN) showWin(me.name);
      } else { g.x=me.x; g.y=me.y; }
      g.held=false; g.holderIdx=-1; me.heldGemIdx=-1;
      if(db){ db.collection('game_rooms').doc(roomDocId).update({ actionLog: { type: 'drop', pid: myId, atBase, gx, gy, ts: Date.now() } }).catch(e=>{}); }
    }
    prevMouse=mouseDown;
  }
  draw(); requestAnimationFrame(gameLoop);
}

function drawGem(x,y,col,size){
  ctx.save();ctx.translate(x,y);ctx.beginPath();ctx.moveTo(0,-size*1.1);ctx.lineTo(size*.75,-size*.15);ctx.lineTo(size*.55,size*.9);ctx.lineTo(-size*.55,size*.9);ctx.lineTo(-size*.75,-size*.15);ctx.closePath();ctx.fillStyle=col;ctx.fill();ctx.restore();
}

function draw(){
  if(!ctx) return; ctx.clearRect(0,0,W,H); ctx.fillStyle='#111827'; ctx.fillRect(0,0,W,H);
  players.forEach((_,i)=>{
    const b=BASES[i]; ctx.save(); ctx.beginPath();ctx.arc(b.x,b.y,BASE_R,0,Math.PI*2);ctx.fillStyle=PBG[i];ctx.fill();ctx.font='bold 11px Segoe UI';ctx.textAlign='center';ctx.fillStyle=PC[i];ctx.fillText((players[i]?players[i].name:'P'+(i+1))+' 收納點',b.x,b.y+BASE_R+14);ctx.restore();
  });
  gems.forEach(g=>{ if(!g.held) drawGem(g.x,g.y,g.color,9); });
  players.forEach((p,i)=>{
    ctx.save();ctx.beginPath();ctx.arc(p.x,p.y,15,0,Math.PI*2);ctx.fillStyle=PC[i];ctx.fill();ctx.font='bold 9px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#0d1117';ctx.fillText(p.name,p.x,p.y);if(p.heldGemIdx>=0) drawGem(p.x,p.y-22,gems[p.heldGemIdx].color,7);ctx.restore();
  });
}

function showWin(name){ gameOver=true; document.getElementById('win-text').textContent='🏆 '+name+' 獲勝！'; document.getElementById('win-overlay').classList.add('show'); }
function copyLink(){ const url=document.getElementById('share-link').textContent; const btn=document.getElementById('copy-btn'); try{ const ta=document.createElement('textarea'); ta.value=url; ta.style.cssText='position:fixed;top:0;left:0;opacity:0;'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); btn.textContent='✅ 已複製'; setTimeout(()=>{btn.textContent='複製連結';},2000); }catch(e){ prompt('請複製：',url); } }

document.addEventListener('keydown',e=>{ if(e.key){ keys[e.key.toLowerCase()] = true; if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault(); } });
document.addEventListener('keyup',e=>{ if(e.key) keys[e.key.toLowerCase()] = false; });
</script>
</body>
</html>
